services:
  localstack:
    image: localstack/localstack:latest
    environment:
      SERVICES: s3
      DEFAULT_REGION: eu-west-2
      AWS_DEFAULT_REGION: eu-west-2
    ports:
      - "4566:4566"
    volumes:
      - ./localstack-init:/etc/localstack/init/ready.d
      - localstack-data:/var/lib/localstack

  nessie:
    image: ghcr.io/projectnessie/nessie:0.107.4
    ports:
      - "19120:19120"
    environment:
      # Iceberg REST catalog for PyIceberg + DuckDB Iceberg access
      - nessie.catalog.default-warehouse=warehouse
      - nessie.catalog.warehouses.warehouse.location=s3://warehouse/
      - nessie.catalog.service.s3.default-options.region=eu-west-2
      - nessie.catalog.service.s3.default-options.path-style-access=true
      - nessie.catalog.service.s3.default-options.endpoint=http://localstack:4566
      - nessie.catalog.service.s3.default-options.access-key=urn:nessie-secret:quarkus:nessie.catalog.secrets.access-key
      - nessie.catalog.secrets.access-key.name=test
      - nessie.catalog.secrets.access-key.secret=test

  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    depends_on:
      localstack:
        condition: service_started
      nessie:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: eu-west-2
    ports:
      - "7077:7077"
      - "8081:8080"
      - "10000:10000"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/10000"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Single Airflow instance with both dbt-duckdb and dbt-spark adapters
  # Two DAGs: one targets DuckDB, one targets Spark
  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    depends_on:
      localstack:
        condition: service_started
      spark:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      DBT_PROFILES_DIR: /opt/dbt
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dbt_project:/opt/dbt
    ports:
      - "8082:8080"
    command: airflow standalone

  # Marimo notebook — queries both DuckDB and Spark side by side
  notebook:
    build:
      context: ./notebook
      dockerfile: Dockerfile
    depends_on:
      localstack:
        condition: service_started
    environment:
      LAKEHOUSE_DB: /opt/dbt/lakehouse.duckdb
      SPARK_THRIFT_HOST: spark
      SPARK_THRIFT_PORT: "10000"
      NESSIE_URI: http://nessie:19120/iceberg/
      S3_ENDPOINT: http://localstack:4566
    volumes:
      - ./notebooks:/opt/notebooks
      - ./dbt_project:/opt/dbt:ro
    ports:
      - "2718:2718"
    command: marimo edit /opt/notebooks/explore.py --host 0.0.0.0 --port 2718 --no-token

volumes:
  localstack-data:
